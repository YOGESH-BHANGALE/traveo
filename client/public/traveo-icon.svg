<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0000FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CED1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded rectangle background -->
  <rect width="192" height="192" rx="42" fill="url(#bg-gradient)"/>
  
  <!-- Road with arrow icon -->
  <g transform="translate(40, 60)">
    <!-- Bottom road line -->
    <rect x="0" y="90" width="112" height="8" rx="4" fill="white"/>
    
    <!-- Curved road path -->
    <path d="M 0 90 Q 40 90, 60 60 T 112 30" 
          stroke="white" 
          stroke-width="8" 
          stroke-linecap="round" 
          fill="none"/>
    
    <!-- Dashed line on road -->
    <path d="M 20 85 Q 45 80, 60 60 T 100 35" 
          stroke="#0080FF" 
          stroke-width="6" 
          stroke-linecap="round" 
          stroke-dasharray="8,8"
          fill="none"/>
    
    <!-- Arrow head -->
    <path d="M 112 30 L 95 20 L 95 30 L 80 30 L 80 40 L 95 40 L 95 50 Z" 
          fill="white"/>
    
    <!-- Speed lines -->
    <rect x="0" y="75" width="30" height="4" rx="2" fill="white" opacity="0.7"/>
    <rect x="0" y="65" width="20" height="4" rx="2" fill="white" opacity="0.5"/>
  </g>
</svg>
